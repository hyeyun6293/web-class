<!DOCTYPE html>
<html lang="en">
<haed>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .layout {
        display: flex;
        gap: 12px;
        align-items: stretch;
        }


        .layout > section {
        flex: 1;
        min-height: 15px;
        }


        .panel{
        border: 1px solid #d9e8e2;
        border-radius: 12px;
        padding: 14px;
        }

        .panel h2 {
            font-size: 1.15rem;
            color: rgb(73, 44, 0) ;
            margin-bottom: 6px;
        }


        .menu {
            background:#ffe600 ;
            border-color: rgb(255, 0, 0);
            border-radius: 30px;
        }


        @media (max-width: 760px) {
        .layout {
            flex-direction: column; 
            gap: 10px;
            }
        .panel {
            padding: 12px;
        }
        .panel h2 {
            font-size: 1.02rem;
        }
        .panel p {
            font-size: 0.9rem;
        }
        }
    </style>
<body>
    <main class="layout">
    <section class="panel intro">
    <h2>가게 소개</h2>
    <p>우리 가게의 특징을 소개합니다.</p>
    </section>

    <section class="panel menu">
    <h2>대표 메뉴</h2>
    <p>시그니처 메뉴를 보여줍니다.</p>
    </section>

    <section class="panel contact">
    <h2>문의</h2>
    <p>연락처와 운영시간을 안내합니다.</p>
    </section>
    </main>

</body>
